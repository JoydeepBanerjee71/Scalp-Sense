<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scalp</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/User/user_aboutus.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/shared/modern_header.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/User/profile_dropdown.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/shared/user_footer.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
    <nav class="modern-navbar">
        <div class="navbar-left">
            <div class="logo-placeholder" style="border:none; background: transparent; padding: 0;">
                <picture>
                    <source srcset="{{ url_for('static', filename='img/scalpsense_logo.svg') }}" type="image/svg+xml">
                    <img class="navbar-logo"
                         src="{{ url_for('static', filename='img/scalpsense-logo.png') }}"
                         alt="ScalpSense"
                         loading="eager" />
                </picture>
            </div>
            <a class="navbar-brand" href="/user/home" id="navbar-brand">ScalpSense</a>
        </div>
        <div class="navbar-center" id="navbarCenter">
            <ul class="navbar-nav-center">
                <li class="nav-item"><a class="nav-link" href="/user/home">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="/user/about">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/info">Info</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/marketplace">Market Place</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/self-test">Self-Test</a></li>
                
          </ul>
        </div>
        <div class="navbar-right">
            <button class="navbar-icon-btn" type="button" title="Search">
                <svg class="navbar-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </button>
            <button class="navbar-icon-btn" type="button" title="Notifications">
                <svg class="navbar-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                </svg>
            </button>
            <div class="profile-dropdown-container">
                <button class="navbar-icon-btn profile-icon-btn" type="button" title="Profile">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </button>
                <div class="profile-dropdown-menu">
                    <a href="/user/profile" class="profile-dropdown-item profile-item">
                        <span class="profile-dropdown-item-icon">
                            <svg class="profile-icon-svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </span>
                        <span class="profile-dropdown-item-text">Profile</span>
                    </a>
                    <a href="/logout" class="profile-dropdown-item logout-item">
                        <span class="profile-dropdown-item-icon">
                            <svg class="logout-icon-svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                            </svg>
                        </span>
                        <span class="profile-dropdown-item-text">Logout</span>
                    </a>
                </div>
            </div>
            <button class="mobile-menu-toggle" type="button" onclick="document.getElementById('navbarCenter').classList.toggle('show')">
                <svg class="navbar-icon" viewBox="0 0 24 24" fill="currentColor" style="width: 24px; height: 24px;">
                    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                </svg>
            </button>
        </div>
  </nav>


  <div class="backgroundGradient"></div>

  <div class="containerGrid">
      <div class="imageHolderDiv">
          <div class="personCard" style="background-image: url('{{ IMAGE_URL }}');">
          </div>
      </div>
      <div class="textCardDiv">
          <header>
              <div>{{ NAME }}</div>
          </header>
          <div class="mobile" style="text-align: center; font-size: 2rem; padding: 5px; font-weight: 700;">
              {{ NAME}}
          </div>
          <div class="textbox">
                {{ DESCRIPTION | safe }}
          </div>
          <div class="linkDiv">
              <div>
                  <a href="{{ LINKEDIN }}" class="btn">
                      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M19 3C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19ZM18.5 18.5V13.2C18.5 12.3354 18.1565 11.5062 17.5452 10.8948C16.9338 10.2835 16.1046 9.94 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57C12.92 12.8 13.54 12.17 14.31 12.17C14.6813 12.17 15.0374 12.3175 15.2999 12.5801C15.5625 12.8426 15.71 13.1987 15.71 13.57V18.5H18.5ZM6.88 8.56C7.32556 8.56 7.75288 8.383 8.06794 8.06794C8.383 7.75288 8.56 7.32556 8.56 6.88C8.56 5.95 7.81 5.19 6.88 5.19C6.43178 5.19 6.00193 5.36805 5.68499 5.68499C5.36805 6.00193 5.19 6.43178 5.19 6.88C5.19 7.81 5.95 8.56 6.88 8.56ZM8.27 18.5V10.13H5.5V18.5H8.27Z" fill="#333333"/>
                      </svg>
                  </a>
              </div>
              <div>
                  <a href="{{ GITHUB }}" class="btn">
                      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M12 2C10.6868 2 9.38642 2.25866 8.17317 2.7612C6.95991 3.26375 5.85752 4.00035 4.92893 4.92893C3.05357 6.8043 2 9.34784 2 12C2 16.42 4.87 20.17 8.84 21.5C9.34 21.58 9.5 21.27 9.5 21V19.31C6.73 19.91 6.14 17.97 6.14 17.97C5.68 16.81 5.03 16.5 5.03 16.5C4.12 15.88 5.1 15.9 5.1 15.9C6.1 15.97 6.63 16.93 6.63 16.93C7.5 18.45 8.97 18 9.54 17.76C9.63 17.11 9.89 16.67 10.17 16.42C7.95 16.17 5.62 15.31 5.62 11.5C5.62 10.39 6 9.5 6.65 8.79C6.55 8.54 6.2 7.5 6.75 6.15C6.75 6.15 7.59 5.88 9.5 7.17C10.29 6.95 11.15 6.84 12 6.84C12.85 6.84 13.71 6.95 14.5 7.17C16.41 5.88 17.25 6.15 17.25 6.15C17.8 7.5 17.45 8.54 17.35 8.79C18 9.5 18.38 10.39 18.38 11.5C18.38 15.32 16.04 16.16 13.81 16.41C14.17 16.72 14.5 17.33 14.5 18.26V21C14.5 21.27 14.66 21.59 15.17 21.5C19.14 20.16 22 16.42 22 12C22 10.6868 21.7413 9.38642 21.2388 8.17317C20.7362 6.95991 19.9997 5.85752 19.0711 4.92893C18.1425 4.00035 17.0401 3.26375 15.8268 2.7612C14.6136 2.25866 13.3132 2 12 2Z" fill="#333333"/>
                      </svg>
                          
                  </a>
              </div>
          
          </div>
      </div>
  </div>

  {% include 'shared/user_footer.html' %}


    <script src="{{url_for('static', filename='js/User/user_aboutus.js')}}"></script>
    <script src="{{url_for('static', filename='js/User/profile_dropdown.js')}}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
